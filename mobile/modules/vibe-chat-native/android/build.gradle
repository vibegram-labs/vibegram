plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.vibechatnative'
version = '0.1.0'

expoModule {
  // Local app module; publishing config is not needed for EAS app builds.
  canBePublished = false
}

android {
  namespace 'expo.modules.vibechatnative'

  defaultConfig {
    minSdkVersion 24
    targetSdkVersion 35
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }

  kotlinOptions {
    jvmTarget = '17'
  }
}

dependencies {
  implementation 'androidx.recyclerview:recyclerview:1.3.2'
  implementation 'com.google.android.material:material:1.12.0'
  implementation 'com.giphy.sdk:ui:2.1.12'
  implementation 'com.squareup.okhttp3:okhttp:4.12.0'
  implementation expoModule.getExpoDependency('expo-notifications')
  implementation 'com.google.firebase:firebase-messaging:24.0.1'
}
