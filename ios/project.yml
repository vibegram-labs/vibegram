name: Vibe
options:
  bundleIdPrefix: com.mohammadshayani
settings:
  base:
    SWIFT_VERSION: 5.10
    IPHONEOS_DEPLOYMENT_TARGET: 26.0
    PRODUCT_BUNDLE_IDENTIFIER: com.mohammadshayani.vibe.native
    PRODUCT_NAME: Vibe
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
    SWIFT_OBJC_BRIDGING_HEADER: Sources/Packet/Packet-Bridging-Header.h
    OTHER_LDFLAGS[sdk=iphoneos*][arch=arm64]:
      - "$(SRCROOT)/Vendor/Packet/ios-arm64/libphantom_client.a"
      - "-lresolv"
    OTHER_LDFLAGS[sdk=iphonesimulator*][arch=arm64]:
      - "$(SRCROOT)/Vendor/Packet/ios-sim-arm64/libphantom_client.a"
      - "-lresolv"
    OTHER_LDFLAGS[sdk=iphonesimulator*][arch=x86_64]:
      - "$(SRCROOT)/Vendor/Packet/ios-sim-x86_64/libphantom_client.a"
      - "-lresolv"
targets:
  Vibe:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: App
      - path: Sources
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Vibe
        UILaunchScreen: {}
        LSRequiresIPhoneOS: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIViewControllerBasedStatusBarAppearance: true
